
name: Deploy FastAPI to EC2

on:
  push:
    branches:
      - main  # Trigger the workflow on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'

    - name: Install dependencies # not required as we currently do not run tests
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy to EC2 # dependencies installed in the deployment script in this step.
      env:
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
      run: |
        # Create a temporary file for the SSH key
        echo "$SSH_PRIVATE_KEY" > ssh_key
        chmod 600 ssh_key

        # Run deployment script 
        ssh -i ssh_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST 'bash /home/ubuntu/deployment-scripts/deploy_backend.sh'

        # Copy NGINX configuration to EC2
        scp -i ssh_key -o StrictHostKeyChecking=no ./config/nginx/backend.conf ubuntu@$EC2_HOST:/etc/nginx/sites-available/

        # Enable the NGINX configuration
        ssh -i ssh_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST 'sudo ln -sf /etc/nginx/sites-available/backend.conf /etc/nginx/sites-enabled/backend.conf'

        # Test NGINX configuration
        ssh -i ssh_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST 'sudo nginx -t'

        # Reload NGINX
        ssh -i ssh_key -o StrictHostKeyChecking=no ubuntu@$EC2_HOST 'sudo systemctl reload nginx'

        # Clean up the temporary SSH key file
        rm ssh_key